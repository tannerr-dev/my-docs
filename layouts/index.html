{{ define "main" }}
  <article class="markdown">
    {{- .Content -}}

    {{ range .Site.Sections }}
      <h2><a href="{{ .RelPermalink }}">{{- partial "docs/title" . -}}</a></h2>
      <ul>
      {{ range .Pages }}
        <li>
          <a href="{{ .RelPermalink }}">{{- partial "docs/title" . -}}</a>
          {{ with .Params.description }}
          <br><small>{{ . }}</small>
          {{ end }}
        </li>
      {{ end }}
      </ul>
    {{ end }}
  </article>
{{ end }}
